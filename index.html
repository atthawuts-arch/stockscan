<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#141210" />
<title>LOGA Stock Scanner</title>
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     DESIGN LANGUAGE (preserved): warehouse / industrial, mobile-first
     bg #f4f1ec · ink #141210 · orange accent #ff5a1f
     Archivo (headings/labels) + IBM Plex Mono (data)
     ============================================================ */
  :root{
    --bg:#f4f1ec; --ink:#141210; --orange:#ff5a1f;
    --paper:#fffdf8; --line:#141210; --muted:#6f685d;
    --ok:#1f8a4c; --warn:#c4391b; --low:#c47b00;
    --r:14px; --maxw:520px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Archivo",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  .app{max-width:var(--maxw);margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom)}
  .mono{font-family:"IBM Plex Mono",ui-monospace,monospace}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit;font-size:16px}
  .hide{display:none !important}

  /* ---------- header ---------- */
  header{position:sticky;top:0;z-index:20;background:var(--ink);color:var(--bg);
    padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;
    display:flex;align-items:center;gap:10px;border-bottom:3px solid var(--orange)}
  .logo{display:flex;align-items:center;gap:9px;user-select:none}
  .logo .mark{width:30px;height:30px;border:2px solid var(--orange);border-radius:7px;
    display:grid;place-items:center;background:#0c0b0a;flex:0 0 auto}
  .logo .mark span{display:flex;gap:2px}
  .logo .mark i{display:block;width:2px;height:15px;background:var(--orange)}
  .logo .mark i:nth-child(2){height:11px}.logo .mark i:nth-child(3){height:15px;width:3px}
  .logo .mark i:nth-child(4){height:9px}.logo .mark i:nth-child(5){height:15px}
  .logo h1{font-size:15px;font-weight:800;letter-spacing:.04em;line-height:1;margin:0;text-transform:uppercase}
  .logo small{display:block;font-size:9.5px;color:var(--orange);letter-spacing:.22em;font-weight:600}
  header .spacer{flex:1}
  .lang{display:flex;border:1.5px solid #4a443c;border-radius:9px;overflow:hidden}
  .lang button{padding:6px 9px;font-size:11px;font-weight:700;color:#b8b1a6;letter-spacing:.04em}
  .lang button.on{background:var(--orange);color:#141210}
  .iconbtn{display:grid;place-items:center;width:34px;height:34px;flex:0 0 auto;border:1.5px solid #4a443c;border-radius:9px;color:#b8b1a6;background:transparent}
  .iconbtn:active{background:#4a443c;color:var(--bg)}
  .net{font-size:9px;letter-spacing:.1em;padding:3px 6px;border-radius:6px;font-weight:700;text-transform:uppercase}
  .net.online{background:#143; color:#7bf0a8}
  .net.offline{background:#411;color:#ffb4a1}
  .net.local{background:#3a2f17;color:#ffce8a}

  /* ---------- stats ---------- */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);
    border-bottom:1px solid var(--line)}
  .stat{background:var(--paper);padding:10px 8px;text-align:center}
  .stat .k{font-size:9px;letter-spacing:.13em;color:var(--muted);text-transform:uppercase;font-weight:700}
  .stat .v{font-size:18px;font-weight:700;margin-top:3px}
  .stat .v.mono{font-size:16px}
  .stat.warnv .v{color:var(--low)}

  /* ---------- tabs ---------- */
  nav.tabs{display:flex;background:var(--paper);border-bottom:1px solid var(--line)}
  nav.tabs button{flex:1;padding:13px 4px;font-size:12px;font-weight:800;letter-spacing:.06em;
    text-transform:uppercase;color:var(--muted);border-bottom:3px solid transparent}
  nav.tabs button.on{color:var(--ink);border-bottom-color:var(--orange)}

  main{flex:1;position:relative}
  .view{padding:14px;display:none}
  .view.on{display:block}

  /* ---------- inventory toolbar ---------- */
  .toolbar{display:flex;gap:8px;margin-bottom:10px}
  .search{flex:1;display:flex;align-items:center;gap:8px;background:var(--paper);
    border:1.5px solid var(--line);border-radius:10px;padding:9px 11px}
  .search input{border:none;background:none;outline:none;width:100%;color:var(--ink)}
  .search input::placeholder{color:var(--muted)}
  .chip{border:1.5px solid var(--line);border-radius:10px;padding:0 12px;font-size:11px;font-weight:700;
    text-transform:uppercase;letter-spacing:.04em;background:var(--paper);display:flex;align-items:center;gap:6px;white-space:nowrap}
  .chip.on{background:var(--orange);border-color:var(--orange)}
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--low)}

  /* ---------- product list ---------- */
  .list{display:flex;flex-direction:column;gap:8px}
  .empty{text-align:center;color:var(--muted);padding:40px 10px;font-size:13px}
  .item{background:var(--paper);border:1.5px solid var(--line);border-radius:var(--r);padding:11px 12px;
    display:flex;align-items:center;gap:11px}
  .item:active{transform:scale(.995)}
  .item .body{flex:1;min-width:0}
  .item .nm{font-weight:700;font-size:14.5px;line-height:1.15;display:flex;align-items:center;gap:6px}
  .item .meta{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
  .item .meta .code{font-family:"IBM Plex Mono",monospace;color:var(--ink);font-weight:600}
  .tag{font-size:8.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    padding:2px 5px;border-radius:5px;border:1px solid var(--line)}
  .tag.serial{background:#eae3d6}
  .badge-low{font-size:8.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#fff;
    background:var(--low);padding:2px 6px;border-radius:5px}
  .item .qty{text-align:right;flex:0 0 auto}
  .item .qty .n{font-family:"IBM Plex Mono",monospace;font-size:21px;font-weight:600;line-height:1}
  .item .qty .n.low{color:var(--low)}
  .item .qty .u{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
  .item .qty .val{font-size:10px;color:var(--muted);margin-top:3px;font-family:"IBM Plex Mono",monospace}

  /* ---------- buttons ---------- */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:1.5px solid var(--line);
    border-radius:11px;padding:12px 14px;font-weight:800;font-size:13px;letter-spacing:.03em;
    text-transform:uppercase;background:var(--paper)}
  .btn.primary{background:var(--orange);border-color:var(--orange)}
  .btn.dark{background:var(--ink);color:var(--bg)}
  .btn.block{width:100%}
  .btn.sm{padding:9px 11px;font-size:11px;border-radius:9px}
  .btn:disabled{opacity:.45}
  .row{display:flex;gap:8px}
  .row>*{flex:1}

  /* ---------- dashboard ---------- */
  .dash-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
  .dash-card{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:10px 12px}
  .dash-card .k{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .dash-card .v{font-size:22px;font-weight:800;margin-top:2px}
  .dash-card.in{border-left:3px solid #22c55e}
  .dash-card.out{border-left:3px solid #ef4444}
  .dash-card.total{border-left:3px solid var(--orange)}
  .seg#dashRange{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
  .seg#dashRange button{flex:1;min-width:60px;padding:8px 6px;font-size:11px;border:1px solid var(--line);background:var(--paper);border-radius:9px;cursor:pointer;text-transform:uppercase;font-weight:700;letter-spacing:.03em}
  .seg#dashRange button.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .dash-custom{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .dash-custom input{flex:1;padding:9px 10px;border:1px solid var(--line);border-radius:9px;background:var(--paper);font-family:inherit}
  .dash-chart-wrap{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:12px;margin:10px 0}
  .dash-chart-wrap svg{display:block;width:100%;height:auto}
  .dash-log{display:flex;flex-direction:column;gap:4px;max-height:420px;overflow-y:auto}
  .dash-log .log-row{display:grid;grid-template-columns:78px 1fr 48px auto;gap:8px;align-items:center;padding:6px 8px;border-bottom:1px solid var(--line);font-size:12px}
  .dash-log .log-row .time{font-family:"IBM Plex Mono",monospace;color:var(--muted);font-size:10px}
  .dash-log .log-row .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dash-log .log-row .qty{text-align:right;font-weight:800;font-family:"IBM Plex Mono",monospace}
  .dash-log .log-row .qty.in{color:#16a34a}
  .dash-log .log-row .qty.out{color:#dc2626}
  .dash-log .log-row .meta{font-size:10px;color:var(--muted)}
  .dash-log .empty{padding:20px;text-align:center;color:var(--muted);font-size:12px}

  /* ---------- scan view ---------- */
  .scanwrap{background:#0c0b0a;border:2px solid var(--line);border-radius:var(--r);overflow:hidden;
    position:relative;aspect-ratio:3/4;display:grid;place-items:center}
  .scanwrap video{width:100%;height:100%;object-fit:cover;display:none}
  .scanwrap.live video{display:block}
  .scan-ph{color:#8a8275;text-align:center;padding:24px;font-size:13px}
  .scan-ph .mk{font-size:34px;margin-bottom:8px}
  .reticle{position:absolute;inset:14% 10%;border:2px solid rgba(255,90,31,.85);border-radius:12px;
    box-shadow:0 0 0 2000px rgba(0,0,0,.28);display:none;pointer-events:none}
  .scanwrap.live .reticle{display:block}
  .reticle .laser{position:absolute;left:6%;right:6%;top:50%;height:2px;background:var(--orange);
    box-shadow:0 0 9px 1px var(--orange);animation:sweep 2s ease-in-out infinite}
  @keyframes sweep{0%,100%{top:18%}50%{top:82%}}
  .modeswitch{display:flex;border:2px solid var(--line);border-radius:12px;overflow:hidden;margin:10px 0}
  .modeswitch button{flex:1;padding:13px;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .modeswitch button.on[data-m="in"]{background:var(--ok);color:#fff}
  .modeswitch button.on[data-m="out"]{background:var(--warn);color:#fff}
  .toggle-line{display:flex;align-items:center;justify-content:space-between;background:var(--paper);
    border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:10px}
  .toggle-line .lbl{font-size:12.5px;font-weight:700}
  .toggle-line .lbl small{display:block;font-size:10px;color:var(--muted);font-weight:500;text-transform:none;letter-spacing:0}
  .sw{width:46px;height:26px;border-radius:13px;background:#cfc7ba;border:1.5px solid var(--line);position:relative;flex:0 0 auto}
  .sw::after{content:"";position:absolute;top:1px;left:1px;width:20px;height:20px;border-radius:50%;background:#fff;border:1px solid var(--line);transition:.15s}
  .sw.on{background:var(--orange)}.sw.on::after{left:22px}
  .manual{display:flex;gap:8px;margin-top:4px}
  .manual input{flex:1;border:1.5px solid var(--line);border-radius:11px;padding:11px 12px;background:var(--paper);outline:none}
  .shelf-line{margin:0 0 10px}
  .shelf-line label{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:5px}
  .shelf-line input{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:11px 12px;background:var(--paper);outline:none}
  .shelf-line input:focus{border-color:var(--orange)}
  .scan-readout{margin-top:12px;background:var(--paper);border:1.5px dashed var(--line);border-radius:11px;
    padding:10px 12px;font-size:12px;min-height:42px}
  .scan-readout .k{font-size:9px;letter-spacing:.13em;color:var(--muted);text-transform:uppercase;font-weight:700}
  .scan-readout .v{font-family:"IBM Plex Mono",monospace;font-weight:600;margin-top:2px;word-break:break-all}

  /* ---------- bottom sheet / modal ---------- */
  .scrim{position:fixed;inset:0;background:rgba(20,18,16,.55);z-index:40;display:none;backdrop-filter:blur(2px)}
  .scrim.on{display:block}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;max-width:var(--maxw);margin:0 auto;
    background:var(--bg);border-radius:20px 20px 0 0;border:2px solid var(--line);border-bottom:none;
    transform:translateY(100%);transition:transform .22s cubic-bezier(.2,.8,.2,1);
    max-height:92dvh;overflow-y:auto;padding:0 16px calc(20px + env(safe-area-inset-bottom))}
  .sheet.on{transform:translateY(0)}
  .grip{width:42px;height:5px;border-radius:3px;background:#cabfac;margin:9px auto 4px}
  .sheet h2{font-size:19px;font-weight:800;margin:6px 0 2px}
  .sheet .sub{font-size:11px;color:var(--muted);font-family:"IBM Plex Mono",monospace;margin-bottom:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .field{margin-bottom:11px}
  .field label{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:5px}
  .field input,.field select{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 12px;background:var(--paper);outline:none}
  .field .two{display:flex;gap:9px}.field .two>*{flex:1}
  .seg{display:flex;border:1.5px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{flex:1;padding:11px;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .seg button.on{background:var(--ink);color:var(--bg)}

  .qtybig{display:flex;align-items:center;justify-content:center;gap:16px;margin:6px 0 12px}
  .qtybig button{width:54px;height:54px;border-radius:14px;border:2px solid var(--line);font-size:26px;font-weight:700;background:var(--paper)}
  .qtybig button.primary{background:var(--orange);border-color:var(--orange)}
  .qtybig .num{font-family:"IBM Plex Mono",monospace;font-size:40px;font-weight:600;min-width:90px;text-align:center}
  .qtybig .num small{display:block;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  .valueline{display:flex;justify-content:space-between;background:var(--paper);border:1.5px solid var(--line);
    border-radius:11px;padding:11px 13px;font-family:"IBM Plex Mono",monospace;font-size:13px;font-weight:600;margin-bottom:12px}
  .valueline span:first-child{color:var(--muted);font-family:"Archivo";font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:.06em}

  .serlist{display:flex;flex-direction:column;gap:6px;margin-bottom:6px}
  .serlist .sr{display:flex;align-items:center;gap:8px;background:var(--paper);border:1.5px solid var(--line);
    border-radius:9px;padding:8px 10px;font-family:"IBM Plex Mono",monospace;font-size:12px}
  .serlist .sr .s{flex:1;font-weight:600;word-break:break-all}
  .serlist .sr .t{font-size:9px;color:var(--muted)}
  .hist{margin-top:8px}
  .hist .h{display:flex;gap:8px;align-items:center;font-size:11px;padding:5px 0;border-top:1px solid #e2dacc}
  .hist .h .pill{font-size:8.5px;font-weight:800;text-transform:uppercase;padding:2px 5px;border-radius:5px;color:#fff}
  .hist .h .pill.in{background:var(--ok)}.hist .h .pill.out{background:var(--warn)}
  .hist .h .sn{font-family:"IBM Plex Mono",monospace;font-weight:600;flex:1;word-break:break-all}
  .hist .h .when{color:var(--muted);font-family:"IBM Plex Mono",monospace}
  .section-h{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:800;margin:14px 0 7px}
  .locknote{font-size:11.5px;font-weight:700;color:var(--low);background:#fbf3e0;border:1.5px solid var(--low);border-radius:9px;padding:8px 11px;margin:10px 0 8px;text-align:center}
  .btn:disabled{opacity:.4;pointer-events:none}
  .tag.lock{background:#fbf3e0;color:var(--low);border-color:var(--low)}

  /* ---------- toast + snackbar ---------- */
  .toasts{position:fixed;top:calc(env(safe-area-inset-top) + 10px);left:0;right:0;z-index:80;
    display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;padding:0 12px}
  .toast{max-width:var(--maxw);width:100%;background:var(--ink);color:var(--bg);border-radius:11px;
    padding:11px 14px;font-size:13px;font-weight:600;display:flex;gap:10px;align-items:center;
    border-left:5px solid var(--ok);box-shadow:0 8px 24px rgba(0,0,0,.25);animation:drop .2s ease}
  .toast.warn{border-left-color:var(--low)}.toast.err{border-left-color:var(--warn)}
  .toast .ic{font-size:17px}
  @keyframes drop{from{transform:translateY(-12px);opacity:0}to{transform:translateY(0);opacity:1}}
  .snackbar{position:fixed;left:0;right:0;bottom:calc(14px + env(safe-area-inset-bottom));z-index:70;
    max-width:var(--maxw);margin:0 auto;background:var(--ink);color:var(--bg);border-radius:12px;
    padding:11px 12px 11px 15px;display:flex;align-items:center;gap:10px;transform:translateY(160%);
    transition:transform .2s;box-shadow:0 8px 24px rgba(0,0,0,.3);margin-left:12px;margin-right:12px}
  .snackbar.on{transform:translateY(0)}
  .snackbar .msg{flex:1;font-size:13px;font-weight:600}
  .snackbar .undo{color:var(--orange);font-weight:800;text-transform:uppercase;letter-spacing:.05em;font-size:12px;padding:6px 8px}

  /* ---------- passcode gate ---------- */
  .gate{position:fixed;inset:0;z-index:100;background:var(--ink);color:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:30px}
  .gate .mark{width:64px;height:64px;border:3px solid var(--orange);border-radius:15px;display:grid;place-items:center;background:#0c0b0a}
  .gate .mark span{display:flex;gap:3px}
  .gate .mark i{display:block;width:3px;height:30px;background:var(--orange)}
  .gate .mark i:nth-child(2){height:22px}.gate .mark i:nth-child(3){width:5px}.gate .mark i:nth-child(4){height:18px}
  .gate h1{font-size:24px;font-weight:800;letter-spacing:.05em;margin:0}
  .gate p{color:#b8b1a6;font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;margin:-8px 0 0}
  .gate .pin{display:flex;flex-direction:column;gap:10px;width:248px}
  .gate .pin input{width:100%;text-align:center;
    background:#0c0b0a;border:2px solid #4a443c;border-radius:12px;color:var(--bg);padding:13px;outline:none;font-weight:600}
  .gate .pin input:focus{border-color:var(--orange)}
  .gate #userInput{font-size:16px;font-family:"Archivo",sans-serif;letter-spacing:.02em}
  .gate #pinInput{font-size:22px;font-family:"IBM Plex Mono",monospace;letter-spacing:.4em}
  .gate.bad .pin input{border-color:var(--warn);animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}
  .gate .err{color:#ffb4a1;font-size:12px;font-weight:700;height:16px}

  /* ============================================================
     DESKTOP (≥ 900px): two-pane dashboard.
     Everything below is inside this media query, so the MOBILE
     layout (< 900px) is left exactly as-is.
     ============================================================ */
  @media (min-width:900px){
    html,body{height:100%}
    .app{max-width:1180px;height:100vh;padding:0 20px}
    nav.tabs{display:none}                         /* desktop shows both panels at once */
    main{flex:1;min-height:0;display:grid;grid-template-columns:380px minmax(0,1fr);gap:20px;padding:18px 2px;align-items:stretch}
    .view{display:flex !important;flex-direction:column;min-height:0;padding:0 4px;overflow:auto}
    #view-scan{order:-1}                            /* scan panel on the left */
    #view-scan .scan-readout{margin-top:auto}       /* push last-scan to the bottom of the panel */
    #view-inv .list{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px;align-content:start}
    #view-inv .item{align-items:flex-start}
    /* product sheet / add-edit become a centered dialog instead of a bottom sheet */
    .sheet{left:50%;right:auto;top:50%;bottom:auto;width:min(560px,92vw);max-width:none;margin:0;
      border-radius:18px;border-bottom:2px solid var(--line);max-height:86vh;
      transform:translate(-50%,-50%) scale(.96);opacity:0;visibility:hidden;transition:transform .2s,opacity .2s}
    .sheet.on{transform:translate(-50%,-50%) scale(1);opacity:1;visibility:visible}
    .grip{display:none}
    .toasts,.snackbar{max-width:560px}
    /* a touch more polish on the wide camera column */
    .scanwrap{max-height:60vh}
  }
</style>
</head>
<body>

<!-- ============ PASSCODE GATE (B) ============ -->
<div class="gate" id="gate">

/* ───────────────────────── Bangkok time helpers (GMT+7) ───────────────────────── */
const BKK_TZ = "Asia/Bangkok";
function bkkParts(iso){
  // Returns {y,m,d,hh,mm} as strings in Asia/Bangkok
  const ps = new Intl.DateTimeFormat("en-CA",{timeZone:BKK_TZ,
    year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hourCycle:"h23"
  }).formatToParts(new Date(iso));
  const g = (t) => ps.find(p=>p.type===t)?.value || "";
  return { y:g("year"), m:g("month"), d:g("day"), hh:g("hour"), mm:g("minute") };
}
function bkkDateKey(iso){ const p=bkkParts(iso); return `${p.y}-${p.m}-${p.d}`; }   // "YYYY-MM-DD"
function bkkHourKey(iso){ const p=bkkParts(iso); return p.hh; }                      // "HH" 00..23
function bkkFmtDateTime(iso){ const p=bkkParts(iso); return `${p.d}/${p.m} ${p.hh}:${p.mm}`; }
function bkkToday(){ return bkkDateKey(new Date().toISOString()); }
function bkkAddDays(key, n){                                    // "YYYY-MM-DD" + n days, still Bangkok
  const [y,m,d] = key.split("-").map(Number);
  const t = Date.UTC(y, m-1, d) + n*86400000;
  const dt = new Date(t);
  return dt.toISOString().slice(0,10);
}

/* effective on-hand (used everywhere: list, stats, low-stock, value) */
function onHand(code){
  const p = state.products.get(code); if(!p) return 0;
  if(p.tracking==="serial") return [...state.units.values()].filter(u=>u.code===code && u.status==="in").length;
  return p.qty||0;
}

let sb = null;
async function initCloud(){
  if(!cloudConfigured) return;
  try{
    const { createClient } = await import("https://esm.sh/@supabase/supabase-js@2");
    sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { realtime:{ params:{ eventsPerSecond:10 } } });
  }catch(e){ console.warn("Supabase load failed, running local:", e); sb=null; }
}

async function pullAll(){
  if(!sb) return;
  try{
    const [{data:prods,error:e1},{data:units,error:e2}] = await Promise.all([
      sb.from("products").select("*"),
      sb.from("units").select("*"),
    ]);
    if(e1||e2) throw (e1||e2);
    state.products.clear(); (prods||[]).forEach(p=>state.products.set(p.code,p));
    state.units.clear();    (units||[]).forEach(u=>state.units.set(u.id,u));
    saveCache(); renderAll();
  }catch(e){ console.warn("pullAll failed (using cache):", e); }
  // movements live in a separate table that may not exist yet (one-time migration —
  // see db/movements.sql). Pull it independently so a missing table never breaks
  // products/units sync.
  try{
    const {data, error} = await sb.from("movements").select("*").order("at",{ascending:false}).limit(5000);
    if(error) throw error;
    state.movements.clear(); (data||[]).forEach(m=>state.movements.set(m.id,m));
    saveCache();
    if(currentTab==="dash") renderDashboard();
  }catch(e){ console.warn("pull movements failed (run db/movements.sql to enable the Dashboard):", e); }
}

  if(!sb) return;
  sb.channel("ss-products").on("postgres_changes",{event:"*",schema:"public",table:"products"},(p)=>{
    if(p.eventType==="DELETE"){ state.products.delete(p.old.code); }
    else { const cur=state.products.get(p.new.code);
      if(!cur || new Date(p.new.updated_at) >= new Date(cur.updated_at)) state.products.set(p.new.code,p.new); }
    saveCache(); renderAll(); refreshOpenSheet();
  }).subscribe();
  sb.channel("ss-units").on("postgres_changes",{event:"*",schema:"public",table:"units"},(p)=>{
    if(p.eventType==="DELETE"){ state.units.delete(p.old.id); }
    else { const cur=state.units.get(p.new.id);
      if(!cur || new Date(p.new.updated_at) >= new Date(cur.updated_at)) state.units.set(p.new.id,p.new); }
    saveCache(); renderAll(); refreshOpenSheet();
  }).subscribe();
  sb.channel("ss-movements").on("postgres_changes",{event:"*",schema:"public",table:"movements"},(p)=>{
    if(p.eventType==="DELETE"){ state.movements.delete(p.old.id); }
    else { state.movements.set(p.new.id, p.new); }
    saveCache();
    if(currentTab==="dash") renderDashboard();
  }).subscribe();
}

/* ───────────────────────── OFFLINE QUEUE (A) ─────────────────────────
   Every write updates local state first (optimistic), then tries Supabase.
   On failure the op is queued and flushed on reconnect. Last-write-wins
   via the updated_at column we stamp on each op. */
function persistQueue(){ localStorage.setItem("ss_queue", JSON.stringify(state.queue)); }
function enqueue(op){ state.queue.push(op); persistQueue(); }

async function runOp(op){
  if(!sb) throw new Error("no cloud");
  if(op.kind==="upsertProduct"){ const{error}=await sb.from("products").upsert(op.row); if(error) throw error; }
  else if(op.kind==="deleteProduct"){
    const{error:e1}=await sb.from("units").delete().eq("code",op.code); if(e1) throw e1;
    const{error:e2}=await sb.from("products").delete().eq("code",op.code); if(e2) throw e2;
  }
  else if(op.kind==="upsertUnit"){ const{error}=await sb.from("units").upsert(op.row); if(error) throw error; }
  else if(op.kind==="deleteUnit"){ const{error}=await sb.from("units").delete().eq("id",op.id); if(error) throw error; }
  else if(op.kind==="insertMovement"){ const{error}=await sb.from("movements").insert(op.row); if(error) throw error; }
}

async function push(op){
  if(!sb){ return; }                 // local-only mode: nothing to sync
  if(!state.online){ enqueue(op); return; }
  try{ await runOp(op); }
  catch(e){ console.warn("write failed, queued:", e); enqueue(op); setNet(); }
}

async function flushQueue(){
  if(!sb || !state.online || !state.queue.length) return;
  const pending=[...state.queue]; state.queue=[]; persistQueue();
  for(const op of pending){
    try{ await runOp(op); }
    catch(e){ console.warn("flush failed, re-queue:", e); state.queue.push(op); }
  }
  persistQueue();
  setNet();
  if(!state.queue.length) toast(t("online"),"ok");
}

/* ───────────────────────── localStorage cache ───────────────────────── */
function saveCache(){
  localStorage.setItem("ss_products",  JSON.stringify([...state.products.values()]));
  localStorage.setItem("ss_units",     JSON.stringify([...state.units.values()]));
  // cap movements cache at the most recent 2000 so localStorage doesn't blow up
  const recentMoves = [...state.movements.values()].sort((a,b)=>(b.at||"").localeCompare(a.at||"")).slice(0, 2000);
  localStorage.setItem("ss_movements", JSON.stringify(recentMoves));
}
function loadCache(){
  try{ JSON.parse(localStorage.getItem("ss_products") ||"[]").forEach(p=>state.products.set(p.code,p)); }catch{}
  try{ JSON.parse(localStorage.getItem("ss_units")    ||"[]").forEach(u=>state.units.set(u.id,u)); }catch{}
  try{ JSON.parse(localStorage.getItem("ss_movements")||"[]").forEach(m=>state.movements.set(m.id,m)); }catch{}
}

  if(props.dataset) Object.assign(n.dataset,props.dataset);

/* ───────────────────────── RENDER ───────────────────────── */
function renderAll(){ renderStats(); renderList(); renderShelfList(); }

/* autocomplete for the session-shelf field: distinct known locations */
function renderShelfList(){
  const dl=$("#shelfList"); if(!dl) return;
  const locs=new Set();
  state.products.forEach(p=>{ if(p.loc) locs.add(p.loc); });
  state.units.forEach(u=>{ if(u.loc) locs.add(u.loc); });
  dl.innerHTML=[...locs].sort().map(l=>`<option value="${String(l).replace(/"/g,"&quot;")}"></option>`).join("");
}

function renderStats(){
  const codes=[...state.products.keys()];
  let units=0, value=0;
  codes.forEach(c=>{ const oh=onHand(c); units+=oh; value+=oh*(state.products.get(c).cost||0); });
  $("#stProducts").textContent = codes.length;
  $("#stUnits").textContent = units.toLocaleString();
  $("#stValue").textContent = money(value);
}

function renderList(){
  const q = ($("#search").value||"").trim().toLowerCase();
  const list=$("#list"); list.innerHTML="";
  let items=[...state.products.values()].sort((a,b)=>(a.name||a.code).localeCompare(b.name||b.code));
  if(state.lowOnly) items=items.filter(p=> onHand(p.code) <= (p.min||0));
  if(q) items=items.filter(p=> [p.name,p.code,p.loc].some(v=>(v||"").toLowerCase().includes(q)));

  if(!items.length){
    list.append(el("div",{className:"empty"}, state.products.size? t("noMatches") : t("noProducts")));
    return;
  }
  for(const p of items){
    const oh=onHand(p.code), low = oh <= (p.min||0);
    const item=el("div",{className:"item"});
    const body=el("div",{className:"body"});
    const nm=el("div",{className:"nm"}, p.name||p.code);
    if(p.locked) nm.append(el("span",{className:"tag lock"}, "🔒"));
    if(p.tracking==="serial") nm.append(el("span",{className:"tag serial"}, t("serial")));
    if(low) nm.append(el("span",{className:"badge-low"}, t("lowStock")));
    const meta=el("div",{className:"meta"},
      el("span",{className:"code"}, p.code),
      p.loc? el("span",{}, "· "+p.loc) : "",
      el("span",{}, "· "+money(p.cost||0)));
    body.append(nm,meta);
    const qty=el("div",{className:"qty"},
      el("div",{className:"n"+(low?" low":"")}, String(oh)),
      el("div",{className:"u"}, t("onHandShort")),
      el("div",{className:"val"}, money(oh*(p.cost||0))));
    item.append(body,qty);
    item.addEventListener("click",()=>openSheet(p.code));
    list.append(item);
  }
}

/* update an open sheet after realtime/undo changes */
let openSheetCode=null;
function refreshOpenSheet(){ if(openSheetCode!=null && $("#sheet").classList.contains("on")) openSheet(openSheetCode,true); }

/* ───────────────────────── FEEDBACK: toast / beep / vibrate ───────────────────────── */
let audioCtx=null;
function beep(kind){
  try{ audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    if(kind==="ok"){ o.type="square"; o.frequency.value=880; }
    else if(kind==="warn"){ o.type="sawtooth"; o.frequency.value=220; }
    else { o.type="triangle"; o.frequency.value=520; }
    const tnow=audioCtx.currentTime; g.gain.setValueAtTime(.001,tnow);
    g.gain.exponentialRampToValueAtTime(.25,tnow+.01);
    g.gain.exponentialRampToValueAtTime(.001,tnow+(kind==="warn"?.28:.14));
    o.start(tnow); o.stop(tnow+(kind==="warn"?.3:.16));
  }catch{}
}
function vibrate(kind){ if(navigator.vibrate) navigator.vibrate(kind==="warn"?[60,40,60]:30); }
function toast(msg,kind="ok"){
  beep(kind); vibrate(kind);
  const icon = kind==="warn"?"!":(kind==="err"?"✕":"✓");
  const node=el("div",{className:"toast "+(kind==="ok"?"":kind)}, el("span",{className:"ic"},icon), el("span",{},msg));
  $("#toasts").append(node);
  setTimeout(()=>{ node.style.opacity="0"; node.style.transition="opacity .25s"; setTimeout(()=>node.remove(),260); }, 2200);
}

/* ───────────────────────── UNDO snackbar (H) ───────────────────────── */
let undoTimer=null, undoFn=null;
function showUndo(msg, fn){
  undoFn=fn;
  $("#snackMsg").textContent=msg;
  $("#snackbar").classList.add("on");
  clearTimeout(undoTimer);
  undoTimer=setTimeout(hideUndo, 5000);
}
function hideUndo(){ $("#snackbar").classList.remove("on"); undoFn=null; clearTimeout(undoTimer); }
$("#snackUndo").addEventListener("click",()=>{ const f=undoFn; hideUndo(); if(f) f(); });

/* ───────────────────────── WRITES (optimistic) ───────────────────────── */
function saveProductLocal(p){ p.updated_at=nowISO(); state.products.set(p.code,p); saveCache(); renderAll(); }
function saveUnitLocal(u){ u.updated_at=nowISO(); state.units.set(u.id,u); saveCache(); renderAll(); }

async function upsertProduct(p){ saveProductLocal(p); await push({kind:"upsertProduct", row:{...p}}); }
async function deleteProduct(code){
  const removedUnits=unitsOf(code);
  state.products.delete(code); removedUnits.forEach(u=>state.units.delete(u.id));
  saveCache(); renderAll();
  await push({kind:"deleteProduct", code});
}
async function upsertUnit(u){ saveUnitLocal(u); await push({kind:"upsertUnit", row:{...u}}); }
async function removeUnit(id){ state.units.delete(id); saveCache(); renderAll(); await push({kind:"deleteUnit", id}); }

// Log one in/out event for the dashboard / history. Fire-and-forget — failures
// (e.g. the movements table doesn't exist yet) get queued and flushed later.
function logMovement({code, serial=null, kind, qty=1}){
  const m = { id: uuid(), code, serial: serial||null, kind, qty,
              shelf: state.shelf||null, at: nowISO() };
  state.movements.set(m.id, m);
  saveCache();
  if(currentTab==="dash") renderDashboard();
  push({kind:"insertMovement", row:m});
}

/* ───────────────────────── CHECK-IN / CHECK-OUT (D) ───────────────────────── */
function applyQtyAction(p){
  const before=p.qty||0;
  if(state.mode==="out" && before<=0){ toast(t("qtyEmpty"),"warn"); return; }
  const prev={...p};
  const after = state.mode==="in" ? before+1 : before-1;
  const np={...p, qty:after};
  if(state.mode==="in" && state.shelf) np.loc=state.shelf;   // session shelf → product's current location
  upsertProduct(np);
  logMovement({code:p.code, kind:state.mode, qty:1});
  const oh=onHand(p.code);
  const shelfTag = (state.mode==="in" && state.shelf) ? ` · ${state.shelf}` : "";
  toast(`${p.name||p.code} · ${state.mode==="in"?t("checkIn"):t("checkOut")} → ${oh} ${t("onHandShort")}${shelfTag}`, "ok");
  showUndo(`${p.name||p.code} ${state.mode==="in"?"+1":"−1"}`, ()=> upsertProduct(prev));
  setLastScan(p.code, null);
}

function applySerialAction(p, serial){
  const existing=findUnit(p.code, serial);
  if(state.mode==="in"){
    if(existing && existing.status==="in"){ toast(`${t("alreadyInStock")} · ${serial}`,"warn"); return; }
    const prev = existing? {...existing} : null;
    const loc = state.shelf || (existing && existing.loc) || null;   // session shelf → this unit's location
    const u = existing? {...existing, status:"in", checked_in_at:nowISO(), loc} : {id:uuid(), code:p.code, serial, status:"in", checked_in_at:nowISO(), checked_out_at:null, loc};
    upsertUnit(u);
    logMovement({code:p.code, serial, kind:"in", qty:1});
    toast(`SN ${serial} ${t("checkedIn")} → ${onHand(p.code)} ${t("onHandShort")}${state.shelf?` · ${state.shelf}`:""}`, "ok");
    showUndo(`SN ${serial} ${t("checkedIn")}`, ()=>{ if(prev) upsertUnit(prev); else removeUnit(u.id); });
  } else {
    if(!existing || existing.status==="out"){ toast(`${t("notInStock")} · ${serial}`,"warn"); return; }
    const prev={...existing};
    upsertUnit({...existing, status:"out", checked_out_at:nowISO()});
    logMovement({code:p.code, serial, kind:"out", qty:1});
    toast(`SN ${serial} ${t("checkedOut")} → ${onHand(p.code)} ${t("onHandShort")}`, "ok");
    showUndo(`SN ${serial} ${t("checkedOut")}`, ()=> upsertUnit(prev));
  }
  setLastScan(p.code, serial);
}

/* central scan handler — used by camera, manual entry, role assignment */
function handleScan(productCode, serial){
  const p = state.products.get(productCode);

  // Continuous OFF (F): a scan is a LOOKUP → open the product sheet.
  if(!state.continuous){
    if(!p){ promptAddUnknown(productCode); return; }
    openSheet(productCode);
    setLastScan(productCode, serial);
    return;
  }

  // Continuous ON (F): apply the current mode action, no sheet.
  if(!p){
    // Can't check OUT something that isn't in the catalog.
    if(state.mode==="out"){ toast(`${t("notFound")} · ${productCode}`,"warn"); return; }
    // Check-IN of an unknown barcode → auto-create the product, count it, confirm the name.
    confirmNewProduct(productCode, serial); return;
  }
  if(p.tracking==="serial"){
    if(!serial){ promptSerial(p); return; }       // (C) no serial detected → confirm/scan/type
    applySerialAction(p, serial);
  } else {
    applyQtyAction(p);
  }
}

function setLastScan(code, serial){
  const p=state.products.get(code);
  $("#lastScan").textContent = (p?(p.name||code):code) + (serial? `  ·  SN ${serial}`:"");
}

/* ───────────────────────── CAMERA + DUAL-CODE SCAN (C,E,F) ───────────────────────── */
const FORMATS = ["ean_13","ean_8","upc_a","upc_e","code_128","code_39","qr_code","data_matrix"];
const PRODUCT_SYMBOLOGIES = ["ean_13","ean_8","upc_a","upc_e"]; // typical retail SKU barcodes
let detector=null, stream=null, scanning=false, rafId=null, lastDetectAt=0;

// dedupe bookkeeping (E)
const dedupe = { acceptedKey:null, acceptedAt:0, frameClearedSince:true, emptyStart:0 };

async function ensureDetector(){
  if(detector) return detector;
  let Cls = window.BarcodeDetector;
  if(!Cls){ // polyfill for iPhone/Safari & others
    const mod = await import("https://esm.sh/barcode-detector@2/pure");
    Cls = mod.BarcodeDetector;
  }
  detector = new Cls({ formats: FORMATS });
  return detector;
}

async function enableCamera(){
  if(scanning){ stopCamera(); return; }
  try{
    stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:{ideal:"environment"} }, audio:false });
    const v=$("#video"); v.srcObject=stream; await v.play();
    await ensureDetector();
    $("#scanwrap").classList.add("live"); $("#scanPh").classList.add("hide");
    $("#camBtn").textContent=t("disableCamera");
    scanning=true; dedupe.frameClearedSince=true; tick();
  }catch(e){
    const msg = (e && (e.name==="NotAllowedError"||e.name==="SecurityError")) ? t("cameraDenied") : t("cameraError");
    toast(msg,"err"); console.warn("camera:", e);
  }
}
function stopCamera(){
  scanning=false; if(rafId) cancelAnimationFrame(rafId);
  if(stream){ stream.getTracks().forEach(tr=>tr.stop()); stream=null; }
  $("#scanwrap").classList.remove("live"); $("#scanPh").classList.remove("hide");
  $("#camBtn").textContent=t("enableCamera");
}

async function tick(){
  if(!scanning) return;
  rafId=requestAnimationFrame(tick);
  const now=performance.now();
  if(now-lastDetectAt < 180) return;       // throttle detect() ~5–6 fps
  lastDetectAt=now;
  const v=$("#video"); if(!v||v.readyState<2) return;
  let codes=[];
  try{ codes = await detector.detect(v); }catch{ return; }

  if(!codes.length){                        // empty frame → maybe item left
    if(!dedupe.emptyStart) dedupe.emptyStart=now;
    if(now-dedupe.emptyStart >= FRAME_CLEAR_MS) dedupe.frameClearedSince=true;
    return;
  }
  dedupe.emptyStart=0;

  const roles = assignRoles(codes); if(!roles) return;
  const key = roles.serial? `${roles.productCode}|${roles.serial}` : roles.productCode;

  // (E) accept rules: different key always; same key only after cooldown AND frame cleared since
  const sameKey = key===dedupe.acceptedKey;
  const cooledDown = now-dedupe.acceptedAt >= SCAN_COOLDOWN_MS;
  if(sameKey && !(cooledDown && dedupe.frameClearedSince)) return;

  dedupe.acceptedKey=key; dedupe.acceptedAt=now; dedupe.frameClearedSince=false;
  handleScan(roles.productCode, roles.serial);
}

/* (C) Assign PRODUCT vs SERIAL from all codes in the frame.
   ── Tweak this rule freely. Default precedence for the product code: ──
     1) a code whose value already exists in the catalog
     2) else a code using a product symbology (EAN/UPC)
     3) else the topmost code (smallest boundingBox.y)
   The remaining code (if any) becomes the serial. */
function assignRoles(codes){
  if(!codes.length) return null;
  if(codes.length===1) return { productCode:codes[0].rawValue, serial:null };

  let product = codes.find(c=> state.products.has(c.rawValue));
  if(!product) product = codes.find(c=> PRODUCT_SYMBOLOGIES.includes(c.format));
  if(!product) product = [...codes].sort((a,b)=> (a.boundingBox?.y??0)-(b.boundingBox?.y??0))[0];

  // Serial: only a NON-product-symbology code (Code 128 / QR / Data Matrix / Code 39).
  // A second EAN/UPC in frame is almost certainly another product, not a serial — ignore it.
  const other = codes.find(c=> c!==product && !PRODUCT_SYMBOLOGIES.includes(c.format)) || null;
  return { productCode:product.rawValue, serial: other? other.rawValue : null };
}

/* ───────────────────────── PROMPTS (C,D) ───────────────────────── */
function promptSerial(p){
  // Serialized SKU but no serial code detected → scan again or type/confirm.
  // OCR HOOK: optional Tesseract.js could pre-fill this input from a printed serial.
  openModal(`<h2>${t("serialNeeded")}</h2>
    <div class="sub">${p.name||p.code} · ${p.code}</div>
    <p style="font-size:13px;color:var(--muted);margin:0 0 12px">${t("serialPrompt")}</p>
    <div class="field"><label>${t("scanOrConfirmSerial")}</label>
      <input id="snInput" inputmode="text" autofocus placeholder="SN…" /></div>
    <div class="row"><button class="btn" id="snCancel">${t("cancel")}</button>
      <button class="btn primary" id="snOk">${t("confirm")}</button></div>`);
  $("#snInput").focus();
  $("#snCancel").onclick=closeSheet;
  $("#snOk").onclick=()=>{ const sn=$("#snInput").value.trim(); if(!sn) return; closeSheet(); applySerialAction(p, sn); };
  $("#snInput").addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); $("#snOk").click(); }});
}

function promptAddUnknown(code, serial=null){
  openProductForm({ code, name:"", cost:0, min:0, loc:"", tracking: serial? "serial":"quantity", qty:0 }, true, serial);
}

/* (Auto-create then confirm) Unknown barcode scanned at CHECK-IN:
   Pick tracking from what the camera saw — a non-EAN/UPC second code (Code 128 / QR /
   etc.) means it's a serialized item with an S/N, so check the S/N in IMMEDIATELY
   (snappy receive flow). One code only → quantity, +1 immediately. Then a confirm
   modal opens for naming + a tracking toggle as the safety net: if the auto-decision
   was wrong (e.g., a stray batch barcode got read as a serial), flip the toggle and
   we reverse the action (remove the unit / restore +1) and re-apply the right one. */
function confirmNewProduct(code, serial){
  const initialTracking = serial ? "serial" : "quantity";
  upsertProduct({ code, name:code, cost:0, min:0, loc:"", tracking:initialTracking, qty:0 });
  const pNew = state.products.get(code);
  if(initialTracking==="serial") applySerialAction(pNew, serial);   // instant S/N check-in
  else applyQtyAction(pNew);                                        // instant +1
  hideUndo();   // make room for the name/tracking confirm

  let chosenTracking = initialTracking;
  openModal(`<h2>${t("newProduct")}</h2>
    <div class="sub"><span>${code}</span>
      ${serial?`<span>· SN ${serial}</span>`:""}${state.shelf?`<span>· ${state.shelf}</span>`:""}</div>
    <div class="field"><label>${t('name')}</label>
      <input id="npName" inputmode="text" value="${code}" placeholder="${t('namePh')}" /></div>
    <div class="field"><label>${t('tracking')}</label>
      <div class="seg" id="npTrack">
        <button type="button" data-v="quantity" class="${initialTracking==='quantity'?'on':''}">${t("quantity")}</button>
        <button type="button" data-v="serial" class="${initialTracking==='serial'?'on':''}">${t("serialized")}</button>
      </div></div>
    <div class="field" id="npSnField" style="display:${initialTracking==='serial'?'block':'none'}">
      <label>${t('scanOrConfirmSerial')}</label>
      <input id="npSn" inputmode="text" value="${serial||''}" placeholder="SN…" /></div>
    <div class="row"><button class="btn" id="npSkip">${t('skip')}</button>
      <button class="btn primary" id="npSave">${t('save')}</button></div>`);
  $("#npName").focus(); $("#npName").select();

  $("#npTrack").querySelectorAll("button").forEach(b=> b.onclick=()=>{
    chosenTracking = b.dataset.v;
    $("#npTrack").querySelectorAll("button").forEach(x=>x.classList.toggle("on", x===b));
    $("#npSnField").style.display = chosenTracking==="serial" ? "block" : "none";
    if(chosenTracking==="serial") $("#npSn").focus();
  });

  $("#npSkip").onclick=closeSheet;
  $("#npSave").onclick=()=>{
    const nm = $("#npName").value.trim() || code;
    const cur = state.products.get(code);

    if(chosenTracking === initialTracking){
      // No tracking change — just rename
      upsertProduct({...cur, name:nm});
    } else if(chosenTracking==="serial" && initialTracking==="quantity"){
      // upgrade quantity → serial: need an S/N, reverse the +1, then check in the S/N
      const sn = ($("#npSn").value||"").trim();
      if(!sn){ toast(t("serialNeeded"),"warn"); $("#npSn").focus(); return; }
      upsertProduct({...cur, name:nm, tracking:"serial", qty:0});
      applySerialAction(state.products.get(code), sn);
    } else {
      // downgrade serial → quantity: remove the auto-created unit, then apply +1
      if(serial){ const u = findUnit(code, serial); if(u) removeUnit(u.id); }
      upsertProduct({...cur, name:nm, tracking:"quantity", qty:0});
      applyQtyAction(state.products.get(code));
    }
    closeSheet();
  };
  $("#npName").addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); $("#npSave").click(); }});
  $("#npSn").addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); $("#npSave").click(); }});
}

/* ───────────────────────── PRODUCT SHEET (G) ───────────────────────── */
function openModal(html){ $("#sheetBody").innerHTML=html; $("#scrim").classList.add("on"); $("#sheet").classList.add("on"); }
function closeSheet(){ $("#sheet").classList.remove("on"); $("#scrim").classList.remove("on"); openSheetCode=null; }

function fmtTime(iso){ if(!iso) return ""; const d=new Date(iso);
  return d.toLocaleString(lang==="th"?"th-TH":"en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}); }

function openSheet(code, keepScroll=false){
  const p=state.products.get(code); if(!p){ promptAddUnknown(code); return; }
  openSheetCode=code;
  const oh=onHand(code), val=oh*(p.cost||0), low=oh<=(p.min||0);
  const locked = !!p.locked;
  const head = `<h2>${p.name||p.code}</h2>
    <div class="sub"><span>${p.code}</span>
      <span class="tag ${p.tracking==='serial'?'serial':''}">${p.tracking==='serial'?t('serialized'):t('quantity')}</span>
      ${locked?`<span class="tag lock">🔒 ${t('lockedTag')}</span>`:""}
      ${p.loc?`<span>· ${p.loc}</span>`:""}${low?`<span class="badge-low">${t('lowStock')}</span>`:""}</div>`;
  // locked → details frozen (edit/delete disabled), but stock in/out still allowed
  const footer = `${locked?`<div class="locknote">🔒 ${t('lockedNotice')}</div>`:""}
    <div class="row"><button class="btn" id="editBtn" ${locked?"disabled":""}>${t("editDetails")}</button>
      <button class="btn" id="delBtn" ${locked?"disabled":""} style="color:var(--warn)">${t("delete")}</button></div>
    <div style="height:8px"></div>
    <div class="row"><button class="btn" id="lockBtn">${locked?("🔓 "+t("unlock")):("🔒 "+t("lock"))}</button></div>`;

  if(p.tracking==="serial"){
    const ins = unitsOf(code).filter(u=>u.status==="in").sort((a,b)=>(b.checked_in_at||"").localeCompare(a.checked_in_at||""));
    const hist = unitsOf(code).map(u=>({serial:u.serial, status:u.status, when:u.status==="in"?u.checked_in_at:u.checked_out_at}))
      .filter(h=>h.when).sort((a,b)=>(b.when||"").localeCompare(a.when||"")).slice(0,8);
    openModal(`${head}
      <div class="qtybig"><div class="num">${oh}<small>${t("onHand")}</small></div></div>
      <div class="valueline"><span>${t("value")}</span><span>${money(val)}</span></div>
      <div class="section-h">${t("inStockSerials")}</div>
      <div class="serlist" id="serlist">${ ins.length? ins.map(u=>`
        <div class="sr"><span class="s">${u.serial}</span><span class="t">${u.loc?u.loc+" · ":""}${fmtTime(u.checked_in_at)}</span>
          <button class="btn sm" data-out="${u.serial}">${t("checkOut")}</button></div>`).join("")
        : `<div class="empty" style="padding:14px">${t("none")}</div>` }
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:4px">${t("tapSerialToOut")}</div>
      <div class="section-h">${t("recentActivity")}</div>
      <div class="hist">${ hist.length? hist.map(h=>`
        <div class="h"><span class="pill ${h.status}">${h.status==="in"?t("checkIn"):t("checkOut")}</span>
          <span class="sn">${h.serial}</span><span class="when">${fmtTime(h.when)}</span></div>`).join("")
        : `<div class="empty" style="padding:10px">${t("noHistory")}</div>` }</div>
      <div style="height:14px"></div>
      ${footer}`);
    $("#serlist").querySelectorAll("[data-out]").forEach(b=> b.onclick=()=>{
      const prevMode=state.mode; state.mode="out"; applySerialAction(p, b.dataset.out); state.mode=prevMode; openSheet(code);
    });
  } else {
    openModal(`${head}
      <div class="qtybig"><div class="num" id="qtyNum">${p.qty||0}<small>${t("onHand")}</small></div></div>
      <div class="valueline"><span>${t("value")}</span><span id="lineVal">${money(val)}</span></div>
      <div class="field"><label>${t("moveQtyLabel")}</label>
        <input id="moveQ" type="number" inputmode="numeric" min="1" value="1" />
        <div class="row" style="margin-top:8px">
          <button class="btn" id="moveIn" style="background:var(--ok);border-color:var(--ok);color:#fff">+ ${t("checkIn")}</button>
          <button class="btn" id="moveOut" style="background:var(--warn);border-color:var(--warn);color:#fff">− ${t("checkOut")}</button>
        </div></div>
      <div class="field"><label>${t("setQty")}</label>
        <div class="two"><input id="setQ" type="number" inputmode="numeric" value="${p.qty||0}" />
          <button class="btn dark" id="setBtn">${t("set")}</button></div></div>
      ${footer}`);
    const refresh=()=>{ const cur=state.products.get(code); $("#qtyNum").firstChild.textContent=cur.qty||0;
      $("#lineVal").textContent=money((cur.qty||0)*(cur.cost||0)); renderAll(); };
    // enter how many came IN / went OUT → system computes remaining (fewer errors than manual +/-)
    const move=(sign)=>{ const cur=state.products.get(code); const before=cur.qty||0;
      const nMove=Math.max(1, parseInt($("#moveQ").value||"1",10)||1);
      let after = sign>0 ? before+nMove : before-nMove; let over=false; if(after<0){ after=0; over=true; }
      const np={...cur, qty:after}; if(sign>0 && state.shelf) np.loc=state.shelf;
      upsertProduct(np); refresh();
      toast(over ? t("overDispatch") : `${cur.name||code} ${sign>0?"+":"−"}${nMove} → ${after} ${t("onHandShort")}`, over?"warn":"ok");
      showUndo(`${cur.name||code} ${sign>0?"+":"−"}${nMove}`, ()=>{ upsertProduct({...state.products.get(code), qty:before}); refresh(); }); };
    $("#moveIn").onclick=()=>move(1);
    $("#moveOut").onclick=()=>move(-1);
    $("#setBtn").onclick=()=>{ const cur=state.products.get(code); const before=cur.qty||0; const nv=Math.max(0,parseInt($("#setQ").value||"0",10));
      upsertProduct({...cur, qty:nv}); refresh(); showUndo(`${cur.name||code} → ${nv}`, ()=>{upsertProduct({...state.products.get(code),qty:before}); refresh();}); };
  }

  $("#lockBtn").onclick=()=>{ const cur=state.products.get(code); upsertProduct({...cur, locked:!cur.locked}); openSheet(code); };
  if(!locked){
    $("#editBtn").onclick=()=>openProductForm(state.products.get(code), false);
    $("#delBtn").onclick=()=>{
      if(!confirm(t("deleteConfirm"))) return;
      const snapshot={...p}, unitSnap=unitsOf(code).map(u=>({...u}));
      deleteProduct(code); closeSheet(); toast(t("deleted"),"warn");
      showUndo(`${p.name||code} ${t("deleted")}`, ()=>{ upsertProduct(snapshot); unitSnap.forEach(u=>upsertUnit(u)); });
    };
  }
}

function openProductForm(p, isNew, pendingSerial=null){
  if(!isNew && p && p.locked){ toast(t("lockedNotice"),"warn"); return; }   // locked → details frozen
  openModal(`<h2>${isNew?t("addProduct"):t("editProduct")}</h2>
    <div class="field"><label>${t("code")}</label>
      <input id="fCode" inputmode="text" value="${p.code||""}" ${isNew?"":"disabled"} placeholder="SKU / barcode" /></div>
    <div class="field"><label>${t("name")}</label>
      <input id="fName" value="${p.name||""}" placeholder="${t("namePh")}" /></div>
    <div class="field"><label>${t("tracking")}</label>
      <div class="seg" id="fTrack">
        <button type="button" data-v="quantity" class="${p.tracking!=='serial'?'on':''}">${t("quantity")}</button>
        <button type="button" data-v="serial" class="${p.tracking==='serial'?'on':''}">${t("serialized")}</button>
      </div></div>
    <div class="field" id="qtyField"><label>${t("onHand")}</label>
      <input id="fQty" type="number" inputmode="numeric" value="${p.qty||0}" /></div>
    <div class="field two"><div><label>${t("unitCost")} (${CURRENCY})</label>
        <input id="fCost" type="number" inputmode="decimal" value="${p.cost||0}" /></div>
      <div><label>${t("lowStockAt")}</label><input id="fMin" type="number" inputmode="numeric" value="${p.min||0}" /></div></div>
    <div class="field"><label>${t("location")}</label>
      <input id="fLoc" value="${p.loc||""}" placeholder="A-12 / shelf 3…" /></div>
    <div class="row"><button class="btn" id="fCancel">${t("cancel")}</button>
      <button class="btn primary" id="fSave">${t("save")}</button></div>`);

  let track = p.tracking==="serial"?"serial":"quantity";
  const syncTrack=()=>{ $("#qtyField").style.display = track==="serial"?"none":"block"; };
  syncTrack();
  $("#fTrack").querySelectorAll("button").forEach(b=> b.onclick=()=>{
    track=b.dataset.v; $("#fTrack").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b)); syncTrack();
  });
  $("#fCancel").onclick=closeSheet;
  $("#fSave").onclick=()=>{
    const code=($("#fCode").value||p.code||"").trim(); if(!code){ toast(t("code"),"err"); return; }
    const np={ code, name:$("#fName").value.trim()||code,
      cost:parseFloat($("#fCost").value)||0, min:parseInt($("#fMin").value||"0",10)||0,
      loc:$("#fLoc").value.trim(), tracking:track,
      qty: track==="serial" ? (state.products.get(code)?.qty||0) : (parseInt($("#fQty").value||"0",10)||0) };
    upsertProduct(np);
    closeSheet();
    toast(isNew?t("added"):t("save"),"ok");
    // If a serial was waiting (scanned serialized item that wasn't in catalog), check it in now.
    if(pendingSerial && track==="serial"){ const prevMode=state.mode; state.mode="in"; applySerialAction(np, pendingSerial); state.mode=prevMode; }
    else openSheet(code);
  };
}

/* ───────────────────────── CSV (products + units) ───────────────────────── */
const BOM="﻿";   // Excel/Sheets prepend this; we add it to exports so Thai shows correctly
function csvEscape(v){ v=(v==null?"":String(v)); return /[",\n;\t]/.test(v)? '"'+v.replace(/"/g,'""')+'"' : v; }
function toCSV(rows){ return BOM + rows.map(r=>r.map(csvEscape).join(",")).join("\r\n"); }
// auto-pick the delimiter (handles Excel locales that export ';' or TAB instead of ',')
function detectDelim(text){
  const line=(text.split(/\r?\n/)[0]||"");
  const c={",":(line.match(/,/g)||[]).length,";":(line.match(/;/g)||[]).length,"\t":(line.match(/\t/g)||[]).length};
  if(c[";"]>c[","] && c[";"]>=c["\t"]) return ";";
  if(c["\t"]>c[","]) return "\t";
  return ",";
}
function parseCSV(text, delim){
  text=text.replace(/^﻿/,"");                 // strip BOM
  delim=delim||detectDelim(text);
  const rows=[]; let row=[], cur="", q=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else { if(c==='"') q=true; else if(c===delim){ row.push(cur); cur=""; }
      else if(c==="\n"){ row.push(cur); rows.push(row); row=[]; cur=""; }
      else if(c==="\r"){} else cur+=c; } }
  if(cur.length||row.length){ row.push(cur); rows.push(row); }
  return rows.filter(r=> r.length && r.some(x=>x!==""));
}
// accepted header names → canonical field (case-insensitive; common EN + TH)
const HEADER_ALIAS = {
  code:["code","sku","barcode","id","productcode","product code","item code","รหัส","รหัสสินค้า","บาร์โค้ด"],
  name:["name","product","product name","productname","description","desc","item","ชื่อ","ชื่อสินค้า","รายการ"],
  cost:["cost","price","unit cost","unitcost","unit price","ต้นทุน","ราคา","ราคาต้นทุน"],
  min:["min","minimum","min stock","minstock","reorder","reorder point","ขั้นต่ำ","จุดสั่งซื้อ"],
  loc:["loc","location","shelf","bin","ที่เก็บ","ชั้น","ชั้นวาง"],
  tracking:["tracking","type","track","mode","ประเภท","ประเภทการนับ"],
  qty:["qty","quantity","on hand","onhand","on-hand","stock","count","amount","จำนวน","คงเหลือ"],
  serial:["serial","serial no","serialno","sn","s/n","ซีเรียล","หมายเลขเครื่อง"],
  status:["status","state","สถานะ"],
  locked:["locked","lock","ล็อก","ล็อค"],
};
const isTrue = v => /^(1|true|yes|y|locked|lock|ล็อก|ล็อค|ใช่|จริง)$/i.test(String(v||"").trim());
function colMap(head){ const m={}; Object.entries(HEADER_ALIAS).forEach(([f,a])=>{ const i=head.findIndex(h=>a.includes(h)); if(i>=0) m[f]=i; }); return m; }
const isSerial = v => /seri|ซีเรียล/i.test(String(v||""));
function download(name, text){
  const blob=new Blob([text],{type:"text/csv;charset=utf-8"});
  const a=el("a",{href:URL.createObjectURL(blob), download:name}); document.body.append(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},500);
}

function importProducts(text){
  // Unified import: one file does both products AND their serials.
  // - Rows with a `serial` column filled → product is serial-tracked + that S/N gets checked in.
  //   Same `code` may appear on many rows (one per S/N) — product is upserted once, all S/Ns are added.
  // - Rows with no `serial` → product as before (quantity unless `tracking` column says serial).
  // Backward-compatible: files without a `serial` column work exactly like before.
  const rows=parseCSV(text); if(rows.length<2){ toast(t("importedZero"),"warn"); return; }
  const head=rows[0].map(h=>h.trim().toLowerCase()); const col=colMap(head);
  if(col.code===undefined){ toast(t("noCodeColumn"),"err"); return; }
  const get=(r,f)=> col[f]!==undefined ? (r[col[f]]||"") : "";

  // Pass 1: group rows by code; per code keep the first row's template fields + collect all S/Ns
  const tpl = new Map();        // code → first row (used for name/cost/min/loc/tracking/qty/locked)
  const sns = new Map();        // code → [{serial, status, loc}, …]
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; const code=get(r,"code").trim(); if(!code) continue;
    if(!tpl.has(code)) tpl.set(code, r);
    const serial=get(r,"serial").trim();
    if(serial){
      const status = get(r,"status").trim().toLowerCase()==="out" ? "out" : "in";
      const loc = get(r,"loc").trim() || null;
      if(!sns.has(code)) sns.set(code, []);
      sns.get(code).push({serial, status, loc});
    }
  }

  // Pass 2: upsert each unique product (forcing serial-tracking if any S/N appeared), then upsert units
  let nProducts=0, nUnits=0;
  for(const [code, r] of tpl){
    const hasSn = sns.has(code);
    const tracking = (hasSn || isSerial(get(r,"tracking"))) ? "serial" : "quantity";
    upsertProduct({
      code, name:get(r,"name").trim()||code,
      cost:parseFloat(get(r,"cost"))||0, min:parseInt(get(r,"min")||"0",10)||0,
      loc:get(r,"loc").trim(), tracking,
      qty: tracking==="serial" ? 0 : (parseInt(get(r,"qty")||"0",10)||0),
      locked: col.locked!==undefined ? isTrue(get(r,"locked")) : false,
    });
    nProducts++;
    if(hasSn){
      for(const sn of sns.get(code)){
        const existing = findUnit(code, sn.serial);
        const u = existing
          ? {...existing, status:sn.status, loc:sn.loc||existing.loc||null}
          : { id:uuid(), code, serial:sn.serial, status:sn.status,
              checked_in_at: sn.status==="in" ? nowISO() : null,
              checked_out_at: sn.status==="out" ? nowISO() : null,
              loc: sn.loc };
        upsertUnit(u); nUnits++;
      }
    }
  }

  if(nProducts===0) toast(t("importedZero"),"warn");
  else if(nUnits>0) toast(`${t("importProducts")}: ${nProducts} · ${t("importUnits")}: ${nUnits}`, "ok");
  else              toast(`${t("importProducts")}: ${nProducts}`, "ok");
}
function importUnits(text){
  const rows=parseCSV(text); if(rows.length<2){ toast(t("importedZero"),"warn"); return; }
  const head=rows[0].map(h=>h.trim().toLowerCase()); const col=colMap(head);
  if(col.code===undefined || col.serial===undefined){ toast(t("noCodeColumn"),"err"); return; }
  const get=(r,f)=> col[f]!==undefined ? (r[col[f]]||"") : "";
  let n=0;
  for(let i=1;i<rows.length;i++){ const r=rows[i]; const code=get(r,"code").trim(), serial=get(r,"serial").trim();
    if(!code||!serial) continue;
    const status=get(r,"status").trim().toLowerCase()==="out"?"out":"in";
    const loc=get(r,"loc").trim()||null;
    const existing=findUnit(code,serial);
    const u = existing? {...existing,status,loc:loc||existing.loc||null} : {id:uuid(),code,serial,status,checked_in_at:status==="in"?nowISO():null,checked_out_at:status==="out"?nowISO():null,loc};
    upsertUnit(u); n++; }
  toast(n>0 ? `${t("importUnits")}: ${n}` : t("importedZero"), n>0?"ok":"warn");
}

/* ───────────────────────── DASHBOARD (movements / chart / log) ─────────────────────────
   All filtering and bucketing is done in Asia/Bangkok local days/hours so the
   "Today" cards and the per-day chart match wall-clock expectations in Thailand. */
function totalStockNow(){
  let total=0;
  for(const code of state.products.keys()) total += onHand(code);
  return total;
}
function dashRangeKeys(){
  const today = bkkToday();
  const ds = state.dash;
  if(ds.range==="1d")  return { startKey:today,                endKey:bkkAddDays(today,1),  bucket:"hour" };
  if(ds.range==="7d")  return { startKey:bkkAddDays(today,-6), endKey:bkkAddDays(today,1),  bucket:"day"  };
  if(ds.range==="30d") return { startKey:bkkAddDays(today,-29),endKey:bkkAddDays(today,1),  bucket:"day"  };
  if(ds.range==="all") return { startKey:null,                 endKey:null,                  bucket:"day"  };
  if(ds.range==="custom"){
    const a = ds.from || today, b = ds.to || today;
    const lo = a<=b ? a : b, hi = a<=b ? b : a;
    return { startKey:lo, endKey:bkkAddDays(hi,1), bucket: lo===hi ? "hour" : "day" };
  }
  return { startKey:today, endKey:bkkAddDays(today,1), bucket:"hour" };
}
function filterMovementsForDash(){
  const {startKey,endKey} = dashRangeKeys();
  const code = state.dash.productCode;
  const out=[];
  for(const m of state.movements.values()){
    if(code && m.code!==code) continue;
    const k = bkkDateKey(m.at);
    if(startKey && k<startKey) continue;
    if(endKey   && k>=endKey)  continue;
    out.push(m);
  }
  return out;
}
function renderDashCards(){
  const today = bkkToday();
  let inToday=0, outToday=0;
  for(const m of state.movements.values()){
    if(bkkDateKey(m.at)!==today) continue;
    if(state.dash.productCode && m.code!==state.dash.productCode) continue;
    if(m.kind==="in")  inToday  += (m.qty||1);
    if(m.kind==="out") outToday += (m.qty||1);
  }
  const total = state.dash.productCode ? onHand(state.dash.productCode) : totalStockNow();
  $("#dashTodayIn").textContent  = inToday.toLocaleString();
  $("#dashTodayOut").textContent = outToday.toLocaleString();
  $("#dashTotal").textContent    = total.toLocaleString();
}
function renderDashProductOptions(){
  const sel = $("#dashProduct"); if(!sel) return;
  const cur = sel.value;
  const items = [...state.products.values()].sort((a,b)=> (a.name||a.code).localeCompare(b.name||b.code));
  sel.innerHTML = `<option value="">${t("allProducts")}</option>` +
    items.map(p=>`<option value="${p.code}">${(p.name||p.code).replace(/</g,"&lt;")}</option>`).join("");
  if([...sel.options].some(o=>o.value===cur)) sel.value=cur;
  else { sel.value = state.dash.productCode || ""; }
}
function renderDashChart(moves){
  const wrap = $("#dashChart"); if(!wrap) return;
  const {startKey,endKey,bucket} = dashRangeKeys();

  // Build the list of bucket keys ("YYYY-MM-DD" per day, or "00".."23" for hour mode)
  let keys=[];
  if(bucket==="hour"){
    keys = Array.from({length:24}, (_,h)=> String(h).padStart(2,"0"));
  } else if(startKey && endKey){
    let k=startKey;
    while(k<endKey){ keys.push(k); k=bkkAddDays(k,1); }
  } else {
    // all-time: derive keys from movements actually present
    const set = new Set();
    for(const m of moves) set.add(bkkDateKey(m.at));
    keys = [...set].sort();
    if(!keys.length) keys = [bkkToday()];
  }
  const data = {};
  keys.forEach(k=> data[k] = {in:0,out:0});
  for(const m of moves){
    const k = bucket==="hour" ? bkkHourKey(m.at) : bkkDateKey(m.at);
    if(!data[k]) data[k] = {in:0,out:0};
    data[k][m.kind] += (m.qty||1);
  }
  // ensure correct iteration order even when "all" added extra keys
  keys = Object.keys(data).sort();

  const max = Math.max(1, ...keys.map(k=> Math.max(data[k].in, data[k].out)));
  const W=600, H=220, padL=28, padR=10, padT=10, padB=28;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const groupW = innerW / Math.max(1, keys.length);
  const barW = Math.max(2, Math.min(18, groupW*0.4));

  const ticks = 4;
  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img">`;
  // Y gridlines + labels
  for(let i=0;i<=ticks;i++){
    const y = padT + innerH * (1 - i/ticks);
    const v = Math.round(max * i/ticks);
    svg += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="rgba(0,0,0,.08)" stroke-width="1"/>`;
    svg += `<text x="${padL-4}" y="${y+3}" text-anchor="end" font-size="9" fill="#888">${v}</text>`;
  }
  // bars
  keys.forEach((k,i)=>{
    const cx = padL + groupW*i + groupW/2;
    const inH  = innerH * (data[k].in  / max);
    const outH = innerH * (data[k].out / max);
    svg += `<rect x="${cx-barW-1}" y="${padT+innerH-inH}"  width="${barW}" height="${inH}"  fill="#22c55e" rx="2"/>`;
    svg += `<rect x="${cx+1}"      y="${padT+innerH-outH}" width="${barW}" height="${outH}" fill="#ef4444" rx="2"/>`;
    // x label every Nth tick to avoid clutter
    const step = Math.max(1, Math.ceil(keys.length/8));
    if(i%step===0 || i===keys.length-1){
      const lbl = bucket==="hour" ? k : k.slice(5);   // "MM-DD" or "HH"
      svg += `<text x="${cx}" y="${H-8}" text-anchor="middle" font-size="9" fill="#666">${lbl}</text>`;
    }
  });
  // legend
  svg += `<g font-size="10" fill="#444">
    <rect x="${padL}" y="2" width="9" height="9" fill="#22c55e" rx="2"/><text x="${padL+13}" y="10">${t("checkIn")}</text>
    <rect x="${padL+70}" y="2" width="9" height="9" fill="#ef4444" rx="2"/><text x="${padL+83}" y="10">${t("checkOut")}</text>
  </g>`;
  svg += `</svg>`;
  wrap.innerHTML = svg;
}
function renderDashLog(moves){
  const log = $("#dashLog"); if(!log) return;
  if(!moves.length){
    log.innerHTML = `<div class="empty">${state.movements.size ? t("noActivity") : t("noMovementsYet")}</div>`;
    return;
  }
  const sorted = [...moves].sort((a,b)=> (b.at||"").localeCompare(a.at||""));
  log.innerHTML = sorted.slice(0,300).map(m=>{
    const p = state.products.get(m.code);
    const name = (p?.name || m.code).replace(/</g,"&lt;");
    const meta = [m.serial?`SN ${m.serial}`:null, m.shelf||null].filter(Boolean).join(" · ");
    const sign = m.kind==="in" ? "+" : "−";
    return `<div class="log-row">
      <span class="time">${bkkFmtDateTime(m.at)}</span>
      <span class="name">${name}</span>
      <span class="qty ${m.kind}">${sign}${m.qty||1}</span>
      <span class="meta">${meta}</span>
    </div>`;
  }).join("");
}
function renderDashboard(){
  if(currentTab!=="dash") return;
  renderDashProductOptions();
  renderDashCards();
  const moves = filterMovementsForDash();
  renderDashChart(moves);
  renderDashLog(moves);
}

/* ───────────────────────── PASSCODE GATE (B) ───────────────────────── */
function isUnlocked(){ return localStorage.getItem("ss_unlocked")==="1"; }
function unlock(){ localStorage.setItem("ss_unlocked","1"); $("#gate").classList.add("hide"); $("#app").classList.remove("hide"); }
function lock(){ localStorage.removeItem("ss_unlocked"); location.reload(); }
$("#pinForm").addEventListener("submit",(e)=>{
  e.preventDefault();
  const okUser = $("#userInput").value.trim().toLowerCase() === APP_USERNAME.toLowerCase(); // username case-insensitive
  const okPass = $("#pinInput").value === APP_PASSCODE;                                      // password exact
  if(okUser && okPass){ unlock(); }
  else { $("#gate").classList.add("bad"); $("#pinErr").textContent=t("wrongLogin");
    setTimeout(()=>$("#gate").classList.remove("bad"),450); $("#pinInput").value=""; }
});
// Log out button (clears the device unlock → back to the login gate)
$("#logoutBtn").onclick=()=>{ if(confirm(t("logout")+"?")) lock(); };
// discreet Lock: long-press the logo (kept as a shortcut)
let lpTimer=null;
const startLP=()=>{ lpTimer=setTimeout(()=>{ if(confirm(t("locked")+"?")) lock(); }, 650); };
const cancelLP=()=>clearTimeout(lpTimer);
["mousedown","touchstart"].forEach(ev=>$("#logo").addEventListener(ev,startLP));
["mouseup","mouseleave","touchend","touchcancel"].forEach(ev=>$("#logo").addEventListener(ev,cancelLP));

/* ───────────────────────── NET status ───────────────────────── */
function setNet(){
  const n=$("#net");
  if(!cloudConfigured){ n.className="net local"; n.textContent=t("localOnly"); return; }
  if(state.online){ n.className="net online"; n.textContent=t("online")+(state.queue.length?` ⟳${state.queue.length}`:""); }
  else { n.className="net offline"; n.textContent=t("offline")+(state.queue.length?` ⟳${state.queue.length}`:""); }
}
window.addEventListener("online", ()=>{ state.online=true; setNet(); flushQueue(); });
window.addEventListener("offline",()=>{ state.online=false; setNet(); });

/* ───────────────────────── WIRING ───────────────────────── */
// tabs
let currentTab = "inv";
document.querySelectorAll("nav.tabs button").forEach(b=> b.onclick=()=>{
  currentTab = b.dataset.tab;
  document.querySelectorAll("nav.tabs button").forEach(x=>x.classList.toggle("on",x===b));
  $("#view-inv").classList.toggle("on",  currentTab==="inv");
  $("#view-scan").classList.toggle("on", currentTab==="scan");
  $("#view-dash").classList.toggle("on", currentTab==="dash");
  if(currentTab==="dash") renderDashboard();
});
// language
document.querySelectorAll(".lang button").forEach(b=> b.onclick=()=>{ lang=b.dataset.lang; localStorage.setItem("ss_lang",lang); applyLang(); renderAll(); });
// search + low filter
$("#search").addEventListener("input", renderList);
$("#lowChip").onclick=()=>{ state.lowOnly=!state.lowOnly; sessionStorage.setItem("ss_lowonly", state.lowOnly?"1":"0");
  $("#lowChip").classList.toggle("on", state.lowOnly); renderList(); };
// add
$("#addBtn").onclick=()=>openProductForm({code:"",name:"",cost:0,min:0,loc:"",tracking:"quantity",qty:0}, true);
// mode + continuous
$("#modeSwitch").querySelectorAll("button").forEach(b=> b.onclick=()=>{ state.mode=b.dataset.m;
  $("#modeSwitch").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b)); });
$("#contSw").onclick=()=>{ state.continuous=!state.continuous; $("#contSw").classList.toggle("on",state.continuous); };
// session shelf
$("#shelfInput").value = state.shelf;
$("#shelfInput").addEventListener("input", ()=>{ state.shelf=$("#shelfInput").value.trim(); sessionStorage.setItem("ss_shelf", state.shelf); });
// camera + manual
$("#camBtn").onclick=enableCamera;
$("#manualGo").onclick=()=>{ const v=$("#manualCode").value.trim(); if(!v) return; $("#manualCode").value=""; handleScan(v, null); };
$("#manualCode").addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); $("#manualGo").click(); }});
// CSV
$("#tmplBtn").onclick=downloadTemplate;
// bulk lock/unlock all products (freeze the baseline catalog after import)
$("#lockAllBtn").onclick=()=>{
  const prods=[...state.products.values()]; if(!prods.length) return;
  const lockAll = prods.some(p=>!p.locked);   // any unlocked → lock all; else unlock all
  prods.forEach(p=> upsertProduct({...p, locked:lockAll}));
  toast(lockAll? t("lockedAll") : t("unlockedAll"), "ok");
};
$("#expProd").onclick=exportProducts; $("#expUnits").onclick=exportUnits;
$("#impProd").onclick=()=>$("#fileProd").click(); $("#impUnits").onclick=()=>$("#fileUnits").click();
$("#fileProd").onchange=(e)=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>importProducts(r.result); r.readAsText(f); e.target.value=""; };
$("#fileUnits").onchange=(e)=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>importUnits(r.result); r.readAsText(f); e.target.value=""; };

// dashboard wiring
$("#dashRange").querySelectorAll("button").forEach(b=> b.onclick=()=>{
  state.dash.range = b.dataset.r;
  localStorage.setItem("ss_dash_range", state.dash.range);
  $("#dashRange").querySelectorAll("button").forEach(x=> x.classList.toggle("on", x===b));
  $("#dashCustomRow").style.display = state.dash.range==="custom" ? "flex" : "none";
  if(state.dash.range==="custom" && !state.dash.from){
    // sensible default: last 7 days
    state.dash.to   = bkkToday();
    state.dash.from = bkkAddDays(state.dash.to, -6);
    $("#dashFrom").value = state.dash.from;
    $("#dashTo").value   = state.dash.to;
  }
  renderDashboard();
});
$("#dashProduct").addEventListener("change", e=>{ state.dash.productCode = e.target.value; renderDashboard(); });
$("#dashFrom").addEventListener("change", e=>{ state.dash.from = e.target.value; if(state.dash.range==="custom") renderDashboard(); });
$("#dashTo").addEventListener("change",   e=>{ state.dash.to   = e.target.value; if(state.dash.range==="custom") renderDashboard(); });

// stop camera when leaving the page/tab
document.addEventListener("visibilitychange",()=>{ if(document.hidden && scanning) stopCamera(); });

/* ───────────────────────── PWA (K) ───────────────────────── */
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load",()=> navigator.serviceWorker.register("./service-worker.js").catch(e=>console.warn("SW:",e)));
}

/* ───────────────────────── BOOT ───────────────────────── */
async function boot(){
  applyLang();
  $("#modeSwitch").querySelectorAll("button").forEach(b=>b.classList.toggle("on",b.dataset.m===state.mode));
  $("#lowChip").classList.toggle("on", state.lowOnly);
  // restore dashboard range from last session
  $("#dashRange").querySelectorAll("button").forEach(b=> b.classList.toggle("on", b.dataset.r===state.dash.range));
  $("#dashCustomRow").style.display = state.dash.range==="custom" ? "flex" : "none";
  loadCache(); renderAll();          // offline-first: show last-known stock immediately
  if(isUnlocked()){ $("#gate").classList.add("hide"); $("#app").classList.remove("hide"); }
  else { $("#userInput").focus(); }
  await initCloud();
  if(sb){ await pullAll(); subscribeRealtime(); flushQueue(); }
  setNet();
}
boot();
</script>
</body>
